server {
    listen 80;
    server_name _;

    # Serve environment override CSS as a static file
    location = /_env/override.css {
        alias /etc/nginx/static/env-override.css;
        add_header Content-Type text/css;
    }

    # Proxy all Vault API and non-UI paths unchanged
    location / {
        proxy_pass http://vault:8200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rewrite HTML only for Vault UI paths
    location /ui/ {
        proxy_pass http://vault:8200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable upstream compression so sub_filter can operate on plain text
        proxy_set_header Accept-Encoding "";

        sub_filter_once on;
        sub_filter '</head>' '<link rel="stylesheet" href="/_env/override.css"></head>';
    }
}
