server {
    listen 80;
    server_name _;

    # Allow secrets up to 10 MB (Vault KV values can be large)
    client_max_body_size 10m;

    # Larger proxy buffers for Vault response headers and bodies
    proxy_buffer_size    16k;
    proxy_buffers        8 64k;
    proxy_busy_buffers_size 128k;

    # Timeouts — generous read timeout for long-poll / batch operations
    proxy_connect_timeout  5s;
    proxy_send_timeout    60s;
    proxy_read_timeout   300s;

    # Serve environment override CSS as a static file (no braces in sub_filter)
    location = /_env/override.css {
        alias /etc/nginx/static/env-override.css;
        add_header Content-Type text/css;
    }

    # Proxy all Vault API and non-UI paths unchanged
    location / {
        proxy_pass http://vault:8200;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # Rewrite HTML only for Vault UI paths
    location /ui/ {
        proxy_pass http://vault:8200;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Prevent upstream gzip so sub_filter can work on plain text
        proxy_set_header Accept-Encoding "";

        sub_filter_once on;
        sub_filter '</head>' '<link rel="stylesheet" href="/_env/override.css"></head>';
    }
}
